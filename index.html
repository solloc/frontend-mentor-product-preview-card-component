<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Product preview card component</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main>
    <img src="./images/image-product-mobile.jpg" alt="perfume bottle" />
    <div class="category">Perfume</div>
    <h1>Gabrielle Essence Eau De Parfum</h1>
    <p>
      A floral, solar and voluptuous interpretation composed by Olivier Polge,
      Perfumer-Creator for the House of CHANEL.
    </p>
    <div class="price">
      <div class="current-price">$149.99</div>
      <div class="original-price">$169.99</div>
    </div>
    <button>Add to Cart</button>
  </main>  
  <footer>
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener">Frontend Mentor</a>. 
    Coded by <a href="https://www.frontendmentor.io/profile/solloc" target="_blank" rel="noopener">Matthias Maisch</a>.
  </footer>
</body>
</html>
